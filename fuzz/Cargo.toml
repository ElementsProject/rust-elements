[package]
name = "elements-fuzz"
edition = "2021"
rust-version = "1.74.0"
version = "0.0.1"
authors = ["Generated by fuzz/generate-files.sh"]
publish = false

[package.metadata]
cargo-fuzz = true

[dependencies]
elements = { path = "../", features = [ "serde" ] }
libfuzzer-sys = { version = "0.4.0" }

[lints.rust]
unexpected_cfgs = { level = "deny", check-cfg = ['cfg(fuzzing)'] }

[lints.clippy]
redundant_clone = "warn"
use_self = "warn"

[package.metadata.rbmt.lint]
allowed_duplicates = [
    "bitcoin_hashes",
    "bitcoin-internals",
    "hex-conservative",
    "getrandom",
    "wasi",
]

[[bin]]
name = "deserialize_block"
path = "fuzz_targets/deserialize_block.rs"
test = false
doc = false
bench = false

[[bin]]
name = "deserialize_output"
path = "fuzz_targets/deserialize_output.rs"
test = false
doc = false
bench = false

[[bin]]
name = "deserialize_pset"
path = "fuzz_targets/deserialize_pset.rs"
test = false
doc = false
bench = false

[[bin]]
name = "deserialize_transaction"
path = "fuzz_targets/deserialize_transaction.rs"
test = false
doc = false
bench = false
